version: '3.9'
services:
  alipay-ai-service:
    build: .
    container_name: alipay-ai-service
    ports:
      - "8080:8080"
    environment:
      - SERVER_ADDR=:8080
      - ALIPAY_GATEWAY=https://openapi.alipay.com/gateway.do
      - ALIPAY_APP_ID=${ALIPAY_APP_ID}
      - ALIPAY_APP_PRIVATE_KEY_FILE=/run/secrets/app_private_key.pem
      - ALIPAY_PUBLIC_KEY_FILE=/run/secrets/alipay_public_key.pem
      - ALIPAY_NOTIFY_URL=${ALIPAY_NOTIFY_URL}
      - ALIPAY_AI_COLLECT_METHOD=${ALIPAY_AI_COLLECT_METHOD}
      - ALIPAY_AI_COLLECT_VERSION=1.0
      - ALIPAY_APP_AUTH_TOKEN=${ALIPAY_APP_AUTH_TOKEN}
    volumes:
      - ./secrets:/run/secrets:ro
